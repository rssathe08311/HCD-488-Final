<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Security in the Age of Generative AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">
        <h1>Personal Security in the Age of Generative AI</h1>
        <form id="translateForm">
            <div class="mb-3">
                <label for="text" class="form-label">Your Text</label>
                <textarea class="form-control" id="text" rows="5"></textarea>
            </div>
            <div class="mb-3">
                <label for="level" class="form-label">Target Audience</label>
                <select class="form-select" id="level">
                    <option value="General Public">General Public</option>
                    <option value="Computing Professional">Computing Professional</option>
                    <option value="College Student">College Student</option>
                    <option value="Computing College Student">Computing College Student</option>
                    <option value="High Schooler">High Schooler</option>
                    <option value="Middle Schooler">Middle Schooler</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Translate</button>
        </form>
        <h3 class="mt-4">Translated Text:</h3>
        <p id="translatedText"></p>
    </div>
    <script>
        document.getElementById('translateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('text').value;
            const level = document.getElementById('level').value;

            const response = await fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, level }),
            });

            const data = await response.json();
            document.getElementById('translatedText').textContent = data.translatedText || 'Error translating text.';
        });
    </script>
</body>
</html>
